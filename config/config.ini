# 量化系统配置文件

# ==================== 回测配置 ====================
[backtest]
# 默认回测参数（优化版，低回撤）
default_factor = momentum_20
default_top_n = 20
default_holding_period = 20
default_position_size = 0.6
default_stop_loss = 0.10
default_use_reverse = true

# 风控参数
max_position_per_stock = 0.08
target_volatility = 0.20
volatility_filter_lower = 0.2
volatility_filter_upper = 0.8

# 回测区间
backtest_start_date = 20200101
backtest_end_date = 

# ==================== 数据源配置 ====================
[data]
# 主数据源：akshare
primary_data_source = akshare

# 备用数据源：tushare（需要配置 token）
fallback_data_source = tushare
tushare_token = 
tushare_api_url = http://api.tushare.pro

# 数据更新配置
update_batch_size = 100
update_delay_seconds = 2
update_retry_times = 3

# ==================== 数据库配置 ====================
[database]
db_path = database/quant.db

# ==================== 因子配置 ====================
[factors]
# 可用因子列表
available_factors = momentum_5,momentum_10,momentum_20,momentum_60,volatility_20,volume_ratio,volume_mean_20,rsi_14

# 默认使用反转因子
use_reverse_factor = true

# ==================== 情绪配置 ====================
[news]
# 情绪数据更新
update_news_daily = true
news_retention_days = 7

# 情绪因子权重
news_factor_weight = 0.3

# ==================== Dashboard 配置 ====================
[dashboard]
default_page = 系统概览
auto_refresh_seconds = 300
show_advanced_options = false
